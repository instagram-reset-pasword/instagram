<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifreyi değiştir</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .header-info {
            font-size: 14px;
            color: #262626;
            margin-bottom: 15px;
            font-weight: 500;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #000;
        }

        .description {
            font-size: 14px;
            color: #262626;
            line-height: 1.4;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            font-size: 14px;
            background-color: #fafafa;
            outline: none;
        }

        input::placeholder {
            color: #8e8e8e;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #b2dffc; /* Aktiv olmayan rəng, şəkildəki kimi */
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 200px; /* Şəkildəki aşağı boşluğu təmin etmək üçün */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">k.nsyvv • Instagram</div>
    <h1>Şifreyi değiştir</h1>
    
    <p class="description">
        Şifren en az 6 karakter olmalı ve rakamlar, harfler ve özel karakterlerden (!S@%) oluşmalıdır.
    </p>

    <div class="input-group">
        <input type="password" placeholder="Mevcut şifre (Güncelleme 06.04.2026)">
    </div>

    <div class="input-group">
        <input type="password" placeholder="Yeni şifre">
    </div>

    <div class="input-group">
        <input type="password" placeholder="Yeni şifreyi tekrar yaz">
    </div>

    <button class="submit-btn">Şifreyi değiştir</button>
</div>

</body>
</html>
