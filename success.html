<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başarılı</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            align-items: center;
        }

        /* En yukarıdaki logo kısmı - Tam merkezde */
        .top-header {
            width: 100%;
            padding: 30px 20px;
            display: flex;
            align-items: center;
            justify-content: center; /* Tam merkezleme */
        }

        .insta-logo-top {
            width: 28px;
            height: 28px;
        }

        .separator {
            margin: 0 8px;
            font-size: 18px;
            color: #262626;
            font-weight: bold;
        }

        .insta-text {
            font-size: 20px;
            font-weight: 700;
            color: #000;
            letter-spacing: -0.5px;
        }

        /* Tam ortadaki yazı */
        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 50px; /* Bir az yuxarı qalxsın deyə */
        }

        .success-text {
            font-size: 24px;
            font-weight: 800;
            color: #000;
        }

        /* En aşağıdakı buton kısmı */
        .bottom-footer {
            width: 100%;
            padding: 20px;
            padding-bottom: 50px;
        }

        .open-app-btn {
            display: block;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            padding: 16px;
            background-color: #4cb5f9; /* Instagram butonu mavisi */
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="top-header">
        <img class="insta-logo-top" src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
        <span class="separator">•</span>
        <span class="insta-text">Instagram</span>
    </div>

    <div class="main-content">
        <h1 class="success-text">Şifre değiştirildi!</h1>
    </div>

    <div class="bottom-footer">
        <a href="instagram://app" class="open-app-btn">Uygulamayı aç</a>
    </div>

</body>
</html>
