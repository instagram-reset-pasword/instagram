<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başarılı</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        /* En yukarıdaki logo kısmı */
        .top-header {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .insta-logo-top {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }

        .insta-text {
            font-size: 18px;
            font-weight: 600;
            color: #262626;
        }

        /* Tam ortadaki yazı */
        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-text {
            font-size: 24px;
            font-weight: 700;
            color: #000;
        }

        /* En aşağıdakı buton kısmı */
        .bottom-footer {
            width: 100%;
            padding: 20px;
            padding-bottom: 40px; /* Telefonun alt hissəsindən bir az yuxarıda qalsın */
        }

        .open-app-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 14px;
            background-color: #0095f6;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="top-header">
        <img class="insta-logo-top" src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
        <span class="insta-text">Instagram</span>
    </div>

    <div class="main-content">
        <h1 class="success-text">şifre değiştirildi!</h1>
    </div>

    <div class="bottom-footer">
        <a href="instagram://app" class="open-app-btn">uygulamayı aç</a>
    </div>

</body>
</html>
