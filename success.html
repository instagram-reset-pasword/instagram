<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başarılı</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; background: #fff;
        }
        .icon-container { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .insta-logo { width: 50px; height: 50px; margin-left: 10px; }
        h2 { color: #262626; font-size: 22px; }
        
        .go-btn {
            margin-top: 30px; padding: 12px 30px; background: #0095f6; 
            color: white; border: none; border-radius: 8px; 
            text-decoration: none; font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <h2>Şifre değiştirildi</h2>
        <img class="insta-logo" src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
    </div>

    <a href="instagram://user?username=instagram" class="go-btn">Instagrama Git</a>

  
</body>
</html>
